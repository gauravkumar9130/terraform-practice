- name: configure webserver
  hosts: all
  tasks:
  - name: install package
    apt:
     name: apache2
     state: present 
  - name: copy website
    copy:
     src: templates/web.j2
     dest: /var/www/html/index.html
  - name: restart service
    service:
      name: apache2
      state: restarted
      enabled: true
  - name: create user
    user:
     name: gaurav
     state: present
    